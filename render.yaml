services:
  - type: web
    name: uv-django
    env: python
    plan: free
    autoDeploy: true
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="$HOME/.local/bin:$PATH" && uv sync --frozen --no-dev && uv run python manage.py collectstatic --noinput && uv run python manage.py migrate
    startCommand: export PATH="$HOME/.local/bin:$PATH" && uv run gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: uv-django-db
          property: connectionString

databases:
  - name: uv-django-db
    databaseName: uv_django
    user: uv_django_user
    plan: free
