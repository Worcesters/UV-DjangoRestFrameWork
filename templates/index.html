{% extends "base.html" %}

{% block title %}Accueil - Mon Projet{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
    <h1 class="text-3xl font-bold mb-4">Bienvenue sur ton interface custom !</h1>
    <p class="text-gray-600 mb-6">
        Ton architecture <strong>uv + Django + HTMX</strong> est maintenant opérationnelle.
    </p>

    <div class="p-6 bg-blue-50 border border-blue-100 rounded-lg">
        <h2 class="text-lg font-semibold text-blue-800 mb-3">Test de l'API (HTMX)</h2>

        <button hx-get="/api/hello/" hx-target="#api-response" hx-swap="innerHTML"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
            Interroger l'API
        </button>

        <div id="api-response"
            class="mt-4 p-3 bg-white rounded border border-blue-200 min-h-[50px] flex items-center justify-center italic text-gray-400">
            En attente d'interaction...
        </div>
    </div>
</div>
{% endblock %}
