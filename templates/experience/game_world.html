{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="game-container" class="relative w-full h-[800px] bg-[#000d1a] overflow-hidden cursor-none font-mono">

    <div class="absolute top-10 left-10 z-50 pointer-events-none">
        <div class="bg-black/60 backdrop-blur-md p-4 border-l-4 border-cyan-500 shadow-2xl">
            <div class="text-cyan-400 text-[10px] tracking-[0.4em] font-bold uppercase mb-1">Status: <span id="status-text" class="text-white">Ancient Shield Active</span></div>
            <div class="w-48 h-2 bg-cyan-950 rounded-full overflow-hidden border border-cyan-500/30">
                <div id="shield-bar" class="h-full bg-cyan-400 shadow-[0_0_20px_#00f2ff] transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="mt-2 text-[9px] text-yellow-500/80 uppercase" id="log-console">> Manual Fire Ready</div>
        </div>
    </div>

    <canvas id="space-canvas" class="w-full h-full"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    (function(){
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000814);
        scene.fog = new THREE.FogExp2(0x001a33, 0.0004);

        // Caméra Cinématique FOV 40
        const camera = new THREE.PerspectiveCamera(40, container.clientWidth/container.clientHeight, 0.1, 25000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('space-canvas'), antialias: true});
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 2.2;

        // Lumières
        scene.add(new THREE.AmbientLight(0x4040ff, 0.8));
        const mainLight = new THREE.DirectionalLight(0xffffff, 4);
        mainLight.position.set(100, 200, -500);
        scene.add(mainLight);

        const loader = new THREE.GLTFLoader();
        let ship, shieldMesh, asteroidModel, explosionModel, gateModel, gateActiveModel, bossModel, hitEffectModel;
        const asteroids = [], drones = [], bossProjectiles = [];

        let shieldPower = 100, droneSide = 1, currentPhase = 'cruise';
        let bossActive = false, currentBoss = null, experienceIndex = 0;
        const keys = {};

        // Données Boss (Expériences)
        const experiences = [
            {% for exp in experiences %}
            { title: "{{ exp.titre|escapejs }}", company: "{{ exp.entreprise|escapejs }}", desc: "{{ exp.description|escapejs }}", hp: 100 },
            {% endfor %}
        ];

        async function loadAllModels() {
            const load = (path) => new Promise(res => loader.load('{% static "models/" %}' + path, gltf => res(gltf.scene)));

            try {
                ship = await load("puddle_jumper.glb");
                ship.scale.set(3.5, 3.5, 3.5); ship.rotation.y = Math.PI;
                scene.add(ship);

                // BOUCLIER RÉDUIT DE MOITIÉ (Rayon 8)
                shieldMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(8, 32, 32),
                    new THREE.MeshBasicMaterial({color: 0x00f2ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide})
                );
                ship.add(shieldMesh);

                asteroidModel = await load("asteroid.glb");
                explosionModel = await load("asteroid_explo.glb");
                gateModel = await load("stargate.glb");
                gateActiveModel = await load("stargate_active.glb");
                bossModel = await load("wraith_ship.glb");
                hitEffectModel = await load("hit_ship.glb");

                for(let i=0; i<25; i++) spawnAsteroid();
                animate();
            } catch(e) { console.error("Erreur de chargement des modèles GLB:", e); }
        }

        loadAllModels();

        function spawnAsteroid() {
            const a = asteroidModel.clone();
            a.position.set((Math.random()-0.5)*1500, (Math.random()-0.5)*800, ship.position.z - 4000 - Math.random()*2000);
            a.scale.setScalar(Math.random() * 0.5 + 0.2);
            scene.add(a);
            asteroids.push(a);
        }

        // --- SYSTÈME DE BOSS ---
        function triggerBossPhase() {
            if (experienceIndex >= experiences.length || currentPhase !== 'cruise') return;
            currentPhase = 'boss_incoming';

            const gate = gateModel.clone();
            gate.position.set(0, 0, ship.position.z - 5000);
            gate.scale.set(60, 60, 60);
            scene.add(gate);

            setTimeout(() => {
                scene.remove(gate);
                const activeGate = gateActiveModel.clone();
                activeGate.position.copy(gate.position);
                activeGate.scale.set(60, 60, 60);
                scene.add(activeGate);

                setTimeout(() => {
                    currentBoss = bossModel.clone();
                    currentBoss.position.copy(activeGate.position);
                    // WRAITH RÉDUIT DE 3/4 (Scale 3)
                    currentBoss.scale.set(3, 3, 3);
                    currentBoss.userData = { hp: 100, gate: activeGate, data: experiences[experienceIndex] };
                    scene.add(currentBoss);
                    bossActive = true;
                    currentPhase = 'boss_fight';
                }, 1000);
            }, 3000);
        }

        // --- TIRS ---
        function spawnDrone() {
            if(!ship || currentPhase === 'boss_incoming') return;
            let target = bossActive ? currentBoss : asteroids.find(a => a.position.z < ship.position.z && ship.position.distanceTo(a.position) < 2500);
            if(!target) return;

            const drone = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({color: 0xffd700}));
            drone.position.copy(ship.position);
            drone.position.x += (droneSide * 8);
            drone.userData = { target: target, velocity: new THREE.Vector3(droneSide * 2, 0.5, -1).normalize(), life: 250 };
            scene.add(drone);
            drones.push(drone);
            droneSide *= -1;
        }

        function bossShoot() {
            if(!bossActive || !currentBoss) return;
            const b = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({color: 0x0088ff}));
            b.position.copy(currentBoss.position);
            const target = ship.position.clone();
            if(Math.random() > 0.25) { // 25% précision
                target.x += (Math.random()-0.5)*150; target.y += (Math.random()-0.5)*150;
            }
            const dir = new THREE.Vector3().subVectors(target, currentBoss.position).normalize();
            b.userData = { velocity: dir.multiplyScalar(35) };
            scene.add(b);
            bossProjectiles.push(b);
        }

        function onShieldHit() {
            if (shieldPower <= 0) return;
            shieldPower -= 5;
            document.getElementById('shield-bar').style.width = shieldPower + "%";
            shieldMesh.material.opacity = 0.8;
            shieldMesh.scale.set(1.1, 1.1, 1.1);
            if(shieldMesh.userData.t) clearTimeout(shieldMesh.userData.t);
            shieldMesh.userData.t = setTimeout(() => {
                shieldMesh.material.opacity = 0;
                shieldMesh.scale.set(1, 1, 1);
            }, 300);
        }

        // --- INPUTS ---
        window.addEventListener('mousedown', spawnDrone);
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        // --- BOUCLE PRINCIPALE ---
        function animate() {
            requestAnimationFrame(animate);
            if(!ship) return;

            // Contrôles
            if(keys['z']) ship.position.y += 3.5; if(keys['s']) ship.position.y -= 3.5;
            if(keys['q']) ship.position.x -= 3.5; if(keys['d']) ship.position.x += 3.5;
            ship.position.z -= 18; // Vitesse de croisière

            // Caméra FOV 40 Surplombante
            camera.position.lerp(new THREE.Vector3(ship.position.x, ship.position.y + 20, ship.position.z + 55), 0.1);
            camera.lookAt(ship.position.x, ship.position.y, ship.position.z - 100);

            // Mise à jour Drones
            for(let i=drones.length-1; i>=0; i--) {
                const d = drones[i];
                const target = d.userData.target;
                const toT = new THREE.Vector3().subVectors(target.position, d.position).normalize();
                d.userData.velocity.lerp(toT, 0.2);
                d.position.add(d.userData.velocity.clone().multiplyScalar(55));

                const hitDist = bossActive ? 20 : 40;
                if(d.position.distanceTo(target.position) < hitDist) {
                    if(bossActive) {
                        currentBoss.userData.hp -= 10;
                        const h = hitEffectModel.clone(); h.position.copy(d.position); scene.add(h);
                        setTimeout(() => scene.remove(h), 200);
                        if(currentBoss.userData.hp <= 0) victory();
                    } else {
                        const ex = explosionModel.clone(); ex.position.copy(d.position); ex.scale.set(2.5,2.5,2.5);
                        scene.add(ex); setTimeout(()=>scene.remove(ex), 500);
                        target.position.z -= 6000; // Reset asteroid
                    }
                    scene.remove(d); drones.splice(i, 1);
                }
                if(d.userData.life-- <= 0) { scene.remove(d); drones.splice(i, 1); }
            }

            // Projectiles Boss
            for(let i=bossProjectiles.length-1; i>=0; i--) {
                const p = bossProjectiles[i];
                p.position.add(p.userData.velocity);
                if(p.position.distanceTo(ship.position) < 25) {
                    onShieldHit(); scene.remove(p); bossProjectiles.splice(i, 1);
                }
                else if(p.position.z > ship.position.z + 200) { scene.remove(p); bossProjectiles.splice(i, 1); }
            }

            // IA Boss Agile
            if(bossActive && currentBoss) {
                currentBoss.position.x = THREE.MathUtils.lerp(currentBoss.position.x, ship.position.x, 0.08);
                currentBoss.position.y = THREE.MathUtils.lerp(currentBoss.position.y, ship.position.y, 0.08);
                currentBoss.position.z = ship.position.z - 1100;
                if(Math.random() < 0.05) bossShoot();
            }

            // --- COLLISIONS ASTÉROÏDES (Marge 70 + Explosions rétablies) ---
            asteroids.forEach(a => {
                a.rotation.y += 0.01;
                const dist = ship.position.distanceTo(a.position);

                if(currentPhase === 'cruise' && dist < 70) {
                    onShieldHit();
                    // Effet d'explosion lors du choc bouclier
                    const ex = explosionModel.clone();
                    ex.position.copy(a.position);
                    ex.scale.set(3, 3, 3);
                    scene.add(ex);
                    setTimeout(() => scene.remove(ex), 500);

                    a.position.z -= 6000;
                    a.position.x = (Math.random()-0.5)*1500;
                }
                if(a.position.z > ship.position.z + 300) a.position.z -= 6000;
            });

            // Déclenchement Boss
            if(currentPhase === 'cruise' && Math.abs(ship.position.z) % 20000 < 25) triggerBossPhase();

            renderer.render(scene, camera);
        }

        function victory() {
            bossActive = false;
            const ex = explosionModel.clone(); ex.position.copy(currentBoss.position); ex.scale.set(15,15,15);
            scene.add(ex);
            const ui = document.getElementById('planet-ui');
            document.getElementById('p-title').innerText = currentBoss.userData.data.title;
            document.getElementById('p-company').innerText = currentBoss.userData.data.company;
            document.getElementById('p-desc').innerText = currentBoss.userData.data.desc;
            ui.classList.replace('opacity-0', 'opacity-100');

            setTimeout(() => {
                scene.remove(currentBoss); scene.remove(currentBoss.userData.gate); scene.remove(ex);
                ui.classList.replace('opacity-100', 'opacity-0');
                currentPhase = 'cruise'; experienceIndex++;
            }, 7000);
        }
    })();
</script>
{% endblock %}
