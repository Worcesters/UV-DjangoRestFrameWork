{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="game-container" class="relative w-full h-[800px] bg-[#000d1a] overflow-hidden cursor-none font-mono">

    <div class="absolute top-10 left-10 z-50 pointer-events-none">
        <div class="bg-black/60 backdrop-blur-md p-4 border-l-4 border-cyan-500 shadow-2xl">
            <div class="text-cyan-400 text-[10px] tracking-[0.4em] font-bold uppercase mb-1">Status: <span id="status-text" class="text-white">Ancient Shield Active</span></div>
            <div class="w-48 h-2 bg-cyan-950 rounded-full overflow-hidden border border-cyan-500/30">
                <div id="shield-bar" class="h-full bg-cyan-400 shadow-[0_0_20px_#00f2ff] transition-all duration-300" style="width: 100%"></div>
            </div>
            <div id="propulsion-hud" class="mt-4 opacity-0 transition-opacity duration-500">
                <div class="text-orange-500 text-[8px] tracking-[0.2em] mb-1 uppercase font-bold">Engine Spooling...</div>
                <div class="w-48 h-1 bg-orange-900/30 rounded-full overflow-hidden">
                    <div id="propulsion-bar" class="h-full bg-orange-500 shadow-[0_0_10px_#f97316]" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="boss-hud" class="absolute top-10 right-10 z-50 pointer-events-none transition-opacity duration-500 opacity-0">
        <div class="bg-black/60 backdrop-blur-md p-4 border-r-4 border-red-600 shadow-2xl text-right">
            <div class="text-red-500 text-[10px] tracking-[0.4em] font-bold uppercase mb-1">Wraith Hive Ship Detected</div>
            <div class="w-64 h-2 bg-red-950 rounded-full overflow-hidden border border-red-600/30">
                <div id="boss-hp-bar" class="h-full bg-red-600 shadow-[0_0_20px_#ff0000] transition-all duration-100" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-10 right-10 z-50 flex flex-col items-center">
        <div class="relative p-6 bg-cyan-950/20 backdrop-blur-md border border-cyan-500/30 rounded-xl shadow-[0_0_50px_rgba(6,182,212,0.15)]">
            <div class="text-[9px] text-cyan-400/60 mb-4 tracking-[0.3em] uppercase text-center">Subspace Capacitor Link</div>

            <div class="grid grid-cols-4 gap-2 mb-6">
                {% for i in "123456789ABC" %}
                <button onclick="dialGlyph(this)" class="w-10 h-10 border border-cyan-500/40 rounded rotate-45 flex items-center justify-center hover:bg-cyan-500/40 hover:shadow-[0_0_15px_#22d3ee] transition-all group">
                    <span class="-rotate-45 text-cyan-300 font-bold group-active:scale-75">◈</span>
                </button>
                {% endfor %}
            </div>

            <button onclick="startPropulsionCharge()" class="w-full py-3 bg-cyan-500/20 border border-cyan-400 text-cyan-100 font-black tracking-[0.4em] text-xs hover:bg-cyan-400 hover:text-black transition-all">
                ENGAGE VORTEX
            </button>
        </div>
    </div>

    <div id="experience-vignette" class="absolute inset-0 flex items-center justify-center z-[100] pointer-events-none opacity-0 transition-all duration-1000 scale-90">
        <div class="bg-black/90 backdrop-blur-xl border-2 border-cyan-500 p-8 w-[600px] shadow-[0_0_50px_rgba(0,242,255,0.4)] relative pointer-events-auto text-center">
            <h2 id="exp-company" class="text-white text-3xl font-black uppercase mb-1 italic">ENTREPRISE</h2>
            <h3 id="exp-title" class="text-yellow-500 text-xl font-bold mb-4 border-b border-white/10 pb-2">POSTE OCCUPÉ</h3>
            <p id="exp-desc" class="text-cyan-100/80 text-sm italic">Détails de la mission...</p>
        </div>
    </div>

    <canvas id="space-canvas" class="w-full h-full"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    (function(){
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        const clock = new THREE.Clock();
        let starField;
        const STAR_COUNT = 1000;
        let chargeParticles = [];

        scene.background = new THREE.Color(0x000814);
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 40000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('space-canvas'), antialias: true});
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 2.0;

        scene.add(new THREE.AmbientLight(0x4040ff, 1.2));
        const mainLight = new THREE.DirectionalLight(0xffffff, 3);
        mainLight.position.set(100, 200, -500);
        scene.add(mainLight);

        const loader = new THREE.GLTFLoader();
        let ship, shieldMesh, asteroidModel, explosionModel, gateActiveModel, bossModel, hitEffectModel, hyperspaceTunnel, engineLight;
        const asteroids = [], drones = [], bossProjectiles = [];

        let shieldPower = 100, droneSide = 1, currentPhase = 'cruise';
        let bossActive = false, currentBoss = null, experienceIndex = 0;
        const keys = {};
        let shakeIntensity = 0;
        const shakeDecay = 0.9;

        let experiences = [
            {% for exp in experiences %}
            { title: "{{ exp.titre|escapejs }}", company: "{{ exp.entreprise|escapejs }}", desc: "{{ exp.description|escapejs }}", hp: 100 },
            {% endfor %}
        ];

        async function loadAllModels() {
            const load = (path) => new Promise(res => loader.load('{% static "models/" %}' + path, gltf => res(gltf.scene)));
            try {
                ship = await load("puddle_jumper.glb");
                ship.scale.set(3.5, 3.5, 3.5); ship.rotation.y = Math.PI;
                ship.traverse(child => { if(child.isMesh) child.material = new THREE.MeshStandardMaterial({ color: 0x0a3d12, metalness: 0.9, roughness: 0.2 }); });
                scene.add(ship);

                const starGeo = new THREE.BufferGeometry();
                const starPositions = new Float32Array(STAR_COUNT * 6); // 2 points par ligne (début/fin)
                for(let i=0; i < STAR_COUNT * 6; i++) {
                    starPositions[i] = (Math.random() - 0.5) * 4000;
                }
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
                const starMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
                starField = new THREE.LineSegments(starGeo, starMat);
                scene.add(starField);

                // Engine Light pour la propulsion
                engineLight = new THREE.PointLight(0x00f2ff, 0, 50);
                engineLight.position.set(0, 0, 10);
                ship.add(engineLight);

                shieldMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(12, 32, 32),
                    new THREE.MeshBasicMaterial({color: 0x00f2ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide})
                );
                shieldMesh.position.set(3, 0, -2);
                ship.add(shieldMesh);

                const tunnelGeo = new THREE.CylinderGeometry(150, 40, 20000, 64, 100, true);
                const tunnelMat = new THREE.MeshStandardMaterial({ color: 0x0066ff, emissive: 0x0022ff, emissiveIntensity: 3, side: THREE.BackSide, transparent: true, opacity: 0.8 });
                hyperspaceTunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
                hyperspaceTunnel.rotation.x = Math.PI / 2;
                hyperspaceTunnel.visible = false;
                scene.add(hyperspaceTunnel);

                bossModel = await load("wraith_ship.glb");
                asteroidModel = await load("asteroid.glb");
                explosionModel = await load("asteroid_explo.glb");
                gateActiveModel = await load("stargate_active.glb");
                hitEffectModel = await load("hit_ship.glb");

                for(let i=0; i<100; i++) spawnAsteroid();
                animate();
            } catch(e) { console.error(e); }
        }

        loadAllModels();

        // NOUVELLE GESTION DHD & PROPULSION
        window.dialGlyph = function(btn) {
            btn.classList.add('bg-cyan-500/60');
            btn.style.boxShadow = "0 0 20px #22d3ee";
        };

        window.startPropulsionCharge = function() {
            if(currentPhase !== 'cruise') return;
            currentPhase = 'charging';
            const hud = document.getElementById('propulsion-hud');
            const bar = document.getElementById('propulsion-bar');
            hud.style.opacity = "1";

            let charge = 0;
            const interval = setInterval(() => {
                charge += 1.5; // Vitesse de remplissage de la barre
                bar.style.width = charge + "%";

                // Effets visuels qui augmentent avec la charge
                shakeIntensity = charge / 15;
                engineLight.intensity = charge / 2;

                // --- CRÉATION DE PARTICULES DE CHARGE ---
                // On en crée de plus en plus au fur et à mesure que ça charge
                for(let i=0; i < Math.floor(charge/20); i++) {
                    const pGeo = new THREE.SphereGeometry(0.5, 4, 4);
                    const pMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                    const p = new THREE.Mesh(pGeo, pMat);

                    // Position au niveau des propulseurs (arrière du vaisseau)
                    p.position.set(
                        ship.position.x + (Math.random() - 0.5) * 20,
                        ship.position.y + (Math.random() - 0.5) * 20,
                        ship.position.z + 10
                    );

                    // On leur donne une direction vers l'arrière
                    p.userData.velocity = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, Math.random() * 5);
                    scene.add(p);
                    chargeParticles.push(p);
                }

                if(charge >= 100) {
                    clearInterval(interval);
                    hud.style.opacity = "0";

                    // --- SUPPRESSION TOTALE DU DÉLAI ---
                    // On nettoie les particules et on saute direct
                    chargeParticles.forEach(p => scene.remove(p));
                    chargeParticles = [];

                    // Appel direct sans setTimeout
                    spawnManualGate();
                }
            }, 30);
        };

        function spawnManualGate() {
            currentPhase = 'boss_incoming';
            const activeGate = gateActiveModel.clone();
            activeGate.position.set(0, 0, ship.position.z - 3000);
            activeGate.scale.set(70, 70, 70);
            scene.add(activeGate);
            const check = setInterval(() => {
                if (ship.position.z < activeGate.position.z + 50) {
                    clearInterval(check);
                    startHyperspace(activeGate);
                }
            }, 16);
        }

        function spawnAsteroid() {
            const a = asteroidModel.clone();
            a.position.set((Math.random()-0.5)*2000, (Math.random()-0.5)*1200, ship.position.z - Math.random()*6000);
            a.scale.setScalar(Math.random() * 0.6 + 0.2);
            a.userData = { reboundVelocity: null };
            scene.add(a);
            asteroids.push(a);
        }

        function onShieldHit(intensity = 10, isBigLaser = false) {
            if (shieldPower <= 0) return;

            // Le gros laser fait 15% de dégâts, les petits 5%
            shieldPower -= isBigLaser ? 15 : 5;

            document.getElementById('shield-bar').style.width = shieldPower + "%";
            shakeIntensity = intensity;
            shieldMesh.material.opacity = 0.8;
            setTimeout(() => shieldMesh.material.opacity = 0, 300);
        }

        window.onkeydown = e => {
            keys[e.key.toLowerCase()] = true;
            if(e.code === 'Space') { e.preventDefault(); spawnDrone(); }
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        window.addEventListener('mousedown', spawnDrone);

        function animate() {
            requestAnimationFrame(animate);
            if (!ship) return;

            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            const factor = delta * 60; // Normalisation pour 60 FPS

            // ==========================================
            // 1. PARTICULES DE CHARGE (PROPULSION)
            // ==========================================
            for (let i = chargeParticles.length - 1; i >= 0; i--) {
                const p = chargeParticles[i];
                p.position.add(p.userData.velocity);
                p.scale.multiplyScalar(0.95); // Rétrécissement
                if (p.scale.x < 0.1) {
                    scene.remove(p);
                    chargeParticles.splice(i, 1);
                }
            }

            // ==========================================
            // 2. CAMÉRA ET ZOOM (FOV)
            // ==========================================
            let targetFOV = 45;
            if (currentPhase === 'charging') targetFOV = 30;
            else if (currentPhase === 'hyperspace') targetFOV = 130;

            camera.fov = THREE.MathUtils.lerp(camera.fov, targetFOV, 0.05);
            camera.updateProjectionMatrix();

            // Distances de proximité (Très proche en combat)
            let targetCamZ = 65, targetCamY = 25;
            if (currentPhase === 'charging') { targetCamZ = 160; targetCamY = 40; }
            else if (currentPhase === 'boss_fight') { targetCamZ = 12; targetCamY = 6; }
            else if (currentPhase === 'hyperspace') { targetCamZ = 8; targetCamY = 4; }

            camera.position.lerp(new THREE.Vector3(ship.position.x, ship.position.y + targetCamY, ship.position.z + targetCamZ), 0.2);

            // ==========================================
            // 3. LOGIQUE DE L'HYPERESPACE (ÉTOILES)
            // ==========================================
            if (currentPhase === 'hyperspace') {
                const hyperSpeed = 1800 * factor;
                ship.position.z -= hyperSpeed;
                starField.material.opacity = THREE.MathUtils.lerp(starField.material.opacity, 1, 0.1);

                const positions = starField.geometry.attributes.position.array;
                for (let i = 0; i < STAR_COUNT * 6; i += 6) {
                    positions[i+2] += hyperSpeed * 0.98;
                    positions[i+5] += hyperSpeed * 0.98;
                    if (positions[i+2] > 1500) {
                        const relX = (Math.random() - 0.5) * 12000;
                        const relY = (Math.random() - 0.5) * 12000;
                        const relZ = -30000 - (Math.random() * 5000);
                        positions[i] = relX; positions[i+1] = relY; positions[i+2] = relZ;
                        positions[i+3] = relX; positions[i+4] = relY;
                        positions[i+5] = relZ + 10000;
                    }
                }
                starField.position.z = ship.position.z;
                starField.geometry.attributes.position.needsUpdate = true;
            } else {
                if (currentPhase !== 'charging') ship.position.z -= 22 * factor;
                if(starField) starField.material.opacity = THREE.MathUtils.lerp(starField.material.opacity, 0, 0.1);
            }

            // ==========================================
            // 4. CONTRÔLES ET SHAKE
            // ==========================================
            if (currentPhase !== 'hyperspace' && currentPhase !== 'charging') {
                const limX = 550, limY = 450;
                if (keys['q'] && ship.position.x > -limX) ship.position.x -= 4.2 * factor;
                if (keys['d'] && ship.position.x < limX) ship.position.x += 4.2 * factor;
                if (keys['z'] && ship.position.y < limY) ship.position.y += 4.2 * factor;
                if (keys['s'] && ship.position.y > -limY) ship.position.y -= 4.2 * factor;
            }

            if (shakeIntensity > 0.1) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= shakeDecay;
            }
            camera.lookAt(ship.position.x, ship.position.y, ship.position.z - 20);

            // ==========================================
            // 5. LOGIQUE DU BOSS (TIRS PRÉDICTIFS 60%)
            // ==========================================
            if (bossActive && currentBoss) {
                // Fixe au centre
                currentBoss.position.x = 0;
                currentBoss.position.y = 0;
                currentBoss.position.z = ship.position.z - 1600;

                // Préparation de la visée prédictive
                const predictionLevel = 0.6; // 60% de précision
                const playerInputVel = new THREE.Vector3(
                    (keys['d'] ? 4.2 : 0) - (keys['q'] ? 4.2 : 0),
                    (keys['z'] ? 4.2 : 0) - (keys['s'] ? 4.2 : 0),
                    0
                ).multiplyScalar(factor * 25 * predictionLevel);

                const targetPoint = ship.position.clone().add(playerInputVel);

                // --- A. GROS BLASTER CENTRAL (Lent, Puissant) ---
                if (elapsedTime - currentBoss.userData.lastShotCenter > 1.2) {
                    const bolt = new THREE.Mesh(
                        new THREE.CylinderGeometry(4, 4, 120, 8),
                        new THREE.MeshBasicMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 5 })
                    );
                    bolt.position.copy(currentBoss.position);
                    const dir = new THREE.Vector3().subVectors(targetPoint, bolt.position).normalize();
                    bolt.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                    bolt.userData = { velocity: dir.multiplyScalar(38), damageScale: 30, isBig: true };
                    scene.add(bolt); bossProjectiles.push(bolt);
                    currentBoss.userData.lastShotCenter = elapsedTime;
                }

                // --- B. CANONS LATÉRAUX (Rapides, Moins puissants) ---
                if (elapsedTime - currentBoss.userData.lastShotWing > 0.4) {
                    // Alternance Gauche / Droite
                    const side = currentBoss.userData.wingSide || 1;
                    const wingBolt = new THREE.Mesh(
                        new THREE.SphereGeometry(3, 8, 8),
                        new THREE.MeshBasicMaterial({ color: 0xccff00, emissive: 0xccff00, emissiveIntensity: 3 })
                    );

                    // Positionnement sur les ailes
                    wingBolt.position.copy(currentBoss.position);
                    wingBolt.position.x += side * 100;
                    wingBolt.position.y -= 10;

                    const dirWing = new THREE.Vector3().subVectors(targetPoint, wingBolt.position).normalize();
                    wingBolt.userData = { velocity: dirWing.multiplyScalar(55), damageScale: 10, isBig: false };

                    scene.add(wingBolt); bossProjectiles.push(wingBolt);
                    currentBoss.userData.lastShotWing = elapsedTime;
                    currentBoss.userData.wingSide = side * -1; // Alterne pour le prochain tir
                }
            }

            // --- MISE À JOUR PROJECTILES BOSS ---
            for (let i = bossProjectiles.length - 1; i >= 0; i--) {
                const p = bossProjectiles[i];
                p.position.add(p.userData.velocity);

                if (p.position.distanceTo(ship.position) < 45) {
                    onShieldHit(p.userData.damageScale, p.userData.isBig);
                    scene.remove(p); bossProjectiles.splice(i, 1);
                } else if (p.position.z > ship.position.z + 500) {
                    scene.remove(p); bossProjectiles.splice(i, 1);
                }
            }

            // ==========================================
            // 6. DRONES ET ASTÉROÏDES
            // ==========================================
            for (let i = drones.length - 1; i >= 0; i--) {
                const d = drones[i];
                const dir = new THREE.Vector3().subVectors(d.userData.target.position, d.position).normalize();
                d.position.add(dir.multiplyScalar(75 * factor));
                if (d.position.distanceTo(d.userData.target.position) < 70) {
                    const explo = (bossActive ? hitEffectModel.clone() : explosionModel.clone());
                    explo.position.copy(d.position);
                    explo.scale.set(1.2, 1.2, 1.2); // Explosions impacts
                    scene.add(explo);
                    setTimeout(() => scene.remove(explo), 400);
                    if (bossActive) {
                        currentBoss.userData.hp -= 10;
                        document.getElementById('boss-hp-bar').style.width = currentBoss.userData.hp + "%";
                        if (currentBoss.userData.hp <= 0) victory();
                    } else { d.userData.target.position.z -= 10000; }
                    scene.remove(d); drones.splice(i, 1);
                }
            }

            asteroids.forEach(a => {
                if (currentPhase === 'boss_fight') { a.visible = false; return; }
                a.visible = true;
                if (a.position.z > ship.position.z + 300) {
                    a.position.z = ship.position.z - 6000 - (Math.random() * 2000);
                    a.position.x = (Math.random() - 0.5) * 2000;
                }
            });

            renderer.render(scene, camera);
        }

        function startHyperspace(gate) {
            currentPhase = 'hyperspace';
            hyperspaceTunnel.visible = true;
            setTimeout(() => {
                hyperspaceTunnel.visible = false;
                currentBoss = bossModel.clone();
                currentBoss.position.set(0, 0, ship.position.z - 1600);
                currentBoss.scale.set(4, 4, 4);
                currentBoss.userData = { hp: 100, gate: gate, data: experiences[experienceIndex % experiences.length], lastShotCenter: 0, lastShotWing: 0, wingSide: 1 };
                scene.add(currentBoss);
                bossActive = true;
                currentPhase = 'boss_fight';
                document.getElementById('boss-hud').classList.replace('opacity-0', 'opacity-100');
            }, 2000);
        }

        function spawnDrone() {
            if(!ship || currentPhase === 'hyperspace' || currentPhase === 'charging') return;
            let target = bossActive ? currentBoss : asteroids.find(a => a.position.z < ship.position.z && ship.position.distanceTo(a.position) < 3000);
            if(!target) return;
            const drone = new THREE.Mesh(new THREE.SphereGeometry(1.6, 12, 12), new THREE.MeshBasicMaterial({color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 2}));
            drone.position.copy(ship.position);
            drone.position.x += (droneSide * 10);
            drone.userData = { target: target };
            scene.add(drone); drones.push(drone);
            droneSide *= -1;
        }

        function victory() {
            bossActive = false;
            document.getElementById('boss-hud').classList.replace('opacity-100', 'opacity-0');
            const finalExplo = explosionModel.clone();
            finalExplo.position.copy(currentBoss.position);
            finalExplo.scale.set(30, 30, 30);
            scene.add(finalExplo);
            setTimeout(() => scene.remove(finalExplo), 1200);
            const data = currentBoss.userData.data;
            scene.remove(currentBoss);
            if(currentBoss.userData.gate) scene.remove(currentBoss.userData.gate);
            const v = document.getElementById('experience-vignette');
            document.getElementById('exp-title').innerText = data.title;
            document.getElementById('exp-company').innerText = data.company;
            document.getElementById('exp-desc').innerText = data.desc;
            v.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { v.classList.replace('opacity-100', 'opacity-0'); currentPhase = 'cruise'; experienceIndex++; }, 8000);
        }
    })();
</script>
{% endblock %}
