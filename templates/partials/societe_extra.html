{% if show %}
<div id="htmx-societe-fragment">
  <div class="space-y-2 rounded-2xl border border-teal-200/60 bg-gradient-to-b from-teal-50/90 to-white p-4 shadow-sm">
    <label class="block text-xs font-bold uppercase tracking-widest text-teal-800"
           for="{{ form.site_web.id_for_label }}">
      {{ form.site_web.label }}
    </label>
    {{ form.site_web }}
    {% if form.site_web.errors %}
    <p class="text-xs font-medium text-red-600">{{ form.site_web.errors.0 }}</p>
    {% endif %}

    <div class="flex items-start gap-2 rounded-xl border border-teal-100 bg-teal-50/80 px-3 py-2.5 text-xs leading-relaxed text-teal-900">
      <span class="mt-0.5 inline-flex h-5 w-5 shrink-0 items-center justify-center rounded-md bg-teal-200/80 text-teal-800" aria-hidden="true">
        <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </span>
      <span>Société détectée : <strong class="font-semibold">{{ societe }}</strong></span>
    </div>
  </div>
</div>
{% endif %}
