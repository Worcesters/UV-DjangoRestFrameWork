{% for doc in documents %}
<a href="{% url 'users:document_detail' slug=doc.slug %}"
   class="group block p-6 bg-white rounded-2xl border-2 border-gray-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all duration-300 text-left">
    <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
            <h3 class="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors truncate">{{ doc.title }}</h3>
            {% if doc.description %}
            <p class="mt-1 text-sm text-gray-500 line-clamp-2">{{ doc.description }}</p>
            {% else %}
            <p class="mt-1 text-sm text-gray-400 italic">Aucune description</p>
            {% endif %}
            <p class="mt-3 text-xs text-gray-400">{{ doc.created_at|date:"d/m/Y" }}{% if doc.author %} · {{ doc.author.email }}{% endif %}</p>
        </div>
        <span class="flex-shrink-0 w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center group-hover:bg-blue-100 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </span>
    </div>
</a>
{% empty %}
<p class="col-span-full text-center text-gray-500 py-12">Aucun document pour le moment.</p>
{% endfor %}
