{% extends "base.html" %}

{% block title %}Nouveau document .md{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
        <h1 class="text-3xl font-bold text-gray-900">Nouveau document Markdown</h1>
        <a href="{% url 'users:index' %}" class="text-sm font-semibold text-gray-500 hover:text-blue-600 transition-colors">← Retour à l'accueil</a>
    </div>

    {% if error %}
    <div class="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl text-red-700 text-sm font-medium">{{ error }}</div>
    {% endif %}

    <form method="post" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        {% csrf_token %}
        <div class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-bold text-gray-700 mb-2">Titre</label>
                <input type="text" name="title" id="title" value="{{ title|default:'' }}" required
                       placeholder="Mon document"
                       class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition">
            </div>
            <div>
                <label for="description" class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                <input type="text" name="description" id="description" value="{{ description|default:'' }}"
                       placeholder="Courte description affichée sur la vignette"
                       class="w-full px-4 py-3 bg-white border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition">
            </div>
            <div>
                <label for="content" class="block text-sm font-bold text-gray-700 mb-2">Contenu Markdown</label>
                <textarea name="content" id="content" rows="18" placeholder="# Titre&#10;&#10;Écrivez votre contenu en **Markdown**..."
                          class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none font-mono text-sm transition">{{ content|default:'' }}</textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-500/25">
                    Enregistrer le document
                </button>
                <a href="{% url 'users:index' %}" class="px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition">Annuler</a>
            </div>
        </div>
        <div>
            <div class="sticky top-24">
                <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Aperçu en direct</p>
                <div id="preview" class="p-6 bg-white border-2 border-gray-200 rounded-2xl shadow-inner min-h-[400px] prose prose-slate max-w-none prose-headings:text-gray-900 prose-p:text-gray-600 prose-a:text-blue-600 prose-code:bg-gray-100 prose-code:px-1 prose-code:rounded">
                    <p class="text-gray-400 italic">Le rendu s'affichera ici...</p>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
    const content = document.getElementById('content');
    const preview = document.getElementById('preview');

    function updatePreview() {
        const raw = content.value.trim();
        if (!raw) {
            preview.innerHTML = '<p class="text-gray-400 italic">Le rendu s\'affichera ici...</p>';
            return;
        }
        try {
            preview.innerHTML = marked.parse(raw, { gfm: true, breaks: true });
        } catch (e) {
            preview.innerHTML = '<p class="text-red-500">Erreur de rendu Markdown.</p>';
        }
    }

    content.addEventListener('input', updatePreview);
    content.addEventListener('change', updatePreview);
    updatePreview();
})();
</script>
{% endblock %}
